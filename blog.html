<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0a1628;--navy-mid:#112240;--gold:#c9a84c;--gold-light:#e8c96d;--gold-pale:#fdf6e3;--white:#fff;--off-white:#f5f7fa;--border:#e2e8f0;--text:#1a202c;--text-mid:#4a5568;--text-muted:#718096}
body{font-family:'Inter',sans-serif;background:var(--off-white);color:var(--text)}
a{text-decoration:none;color:inherit}
nav{background:var(--navy-mid);padding:0 40px;display:flex;align-items:center;height:56px;border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;color:#fff;margin-right:auto}.nav-logo span{color:var(--gold)}
.nav-links{display:flex;gap:20px}.nav-links a{font-size:12px;font-weight:600;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.4px;transition:color .15s}.nav-links a:hover{color:var(--gold)}
.page-hero{background:linear-gradient(135deg,var(--navy) 0%,#1a3a6e 100%);padding:48px 40px 40px;border-bottom:3px solid var(--gold)}
.page-hero-inner{max-width:1100px;margin:0 auto}
.page-hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,5vw,58px);color:#fff;letter-spacing:2px;line-height:1;margin-bottom:10px}
.page-hero h1 em{color:var(--gold-light);font-style:normal}
.page-hero p{font-size:15px;color:rgba(255,255,255,.65);max-width:520px;line-height:1.7}
.filter-bar{background:var(--navy);padding:0 40px;border-bottom:1px solid rgba(255,255,255,.08)}
.filter-bar-inner{max-width:1100px;margin:0 auto;display:flex;gap:0;align-items:center;flex-wrap:wrap}
.filter-tab{font-size:12px;font-weight:700;color:rgba(255,255,255,.5);padding:14px 18px;border-bottom:3px solid transparent;cursor:pointer;text-transform:uppercase;letter-spacing:.4px;transition:all .15s;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter',sans-serif}
.filter-tab:hover{color:var(--gold)}
.filter-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.sport-filter{display:flex;gap:6px;flex-wrap:wrap;padding:10px 0;margin-left:auto}
.sport-btn{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);padding:4px 10px;border-radius:12px;border:1.5px solid rgba(255,255,255,.15);background:transparent;cursor:pointer;text-transform:uppercase;letter-spacing:.3px;transition:all .15s;font-family:'Inter',sans-serif;white-space:nowrap}
.sport-btn:hover{color:var(--gold);border-color:var(--gold)}
.sport-btn.active{background:var(--gold);color:var(--navy);border-color:var(--gold)}
.main{max-width:1100px;margin:0 auto;padding:36px 40px 60px}
.section-label{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--navy);margin-bottom:20px;padding-bottom:8px;border-bottom:2px solid var(--gold);display:flex;align-items:center;gap:10px}
.section-label span{font-size:13px;font-family:'Inter',sans-serif;font-weight:600;color:var(--text-muted);letter-spacing:0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-bottom:48px}
.card{background:var(--white);border-radius:10px;border:1px solid var(--border);overflow:hidden;transition:all .15s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,0.1);border-color:var(--gold)}
.card-sport-bar{height:4px}
.card-body{padding:18px 20px;flex:1;display:flex;flex-direction:column}
.card-type-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.type-badge{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:3px}
.badge-guide{background:var(--gold);color:var(--navy)}
.badge-article{background:#1e3a5f;color:#fff}
.sport-tag{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.3px}
.card h3{font-size:16px;font-weight:700;color:var(--navy);line-height:1.35;margin-bottom:8px;flex:1}
.card p{font-size:13px;color:var(--text-mid);line-height:1.65;margin-bottom:14px}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border);margin-top:auto}
.read-link{font-size:12px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.4px;transition:color .15s}
.card:hover .read-link{color:var(--gold)}
.read-time{font-size:11px;color:var(--text-muted)}
.empty{padding:48px;text-align:center;color:var(--text-muted);grid-column:1/-1}
.empty h3{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--navy);margin-bottom:6px}
footer{background:var(--navy);padding:24px 40px;border-top:3px solid var(--gold)}
.footer-inner{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.footer-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#fff;letter-spacing:1px}.footer-logo span{color:var(--gold)}
.footer-links{display:flex;gap:14px;flex-wrap:wrap}.footer-links a{font-size:11px;color:rgba(255,255,255,.4)}.footer-links a:hover{color:var(--gold)}
@media(max-width:700px){.page-hero,.main{padding-left:20px;padding-right:20px}.filter-bar{padding-left:20px;padding-right:20px}nav{padding:0 20px}.sport-filter{margin-left:0}}
</style>

<script>
const C = {
  soccer:'#4a7c3f',lacrosse:'#1e3a8a',baseball:'#991b1b',softball:'#c2410c',
  basketball:'#c05c00',football:'#7b4a00',tennis:'#4d7c0f',hockey:'#0369a1',
  volleyball:'#b45309',gymnastics:'#7e22ce',cheerleading:'#be185d',
  golf:'#15803d','field-hockey':'#0d6b3a',wrestling:'#6d28d9',
  swimming:'#0891b2',track:'#b91c1c'
};

const CONTENT = [
  // ---- GUIDES ----
  {t:'guide',s:'soccer',title:'How to Choose a Travel Soccer Club on Long Island',
   d:'Navigate LIJSL tryouts, club evaluation, and the difference between recreational and elite travel programs on Long Island.',
   url:'how-to-choose-travel-soccer-long-island.html',m:6},
  {t:'guide',s:'lacrosse',title:'Lacrosse Age Groups on Long Island — Complete Reference Guide',
   d:'USL and LIJSL age cutoffs, PAL divisions, travel lacrosse brackets, and how boys and girls lacrosse timelines differ on Long Island.',
   url:'lacrosse-age-groups-long-island.html',m:5},
  {t:'guide',s:'baseball',title:'Long Island Baseball Recruiting Timeline — Year-by-Year Guide',
   d:'When do college coaches start watching? What showcases matter? A complete recruiting timeline for Long Island youth baseball players.',
   url:'long-island-baseball-recruiting-timeline.html',m:7},
  {t:'guide',s:'basketball',title:'Youth Basketball Age Groups on Long Island',
   d:'CYO, PAL, AAU, and travel basketball explained. Complete age group breakdown and how to know when your child is ready for each level.',
   url:'youth-basketball-age-groups-long-island.html',m:5},
  {t:'guide',s:'football',title:'Pop Warner Football on Long Island — Parent Guide',
   d:'Pop Warner divisions, weight limits, equipment requirements, safety rules, and how NCYFL travel football works on Long Island.',
   url:'long-island-pop-warner-football-guide.html',m:5},
  {t:'guide',s:'football',title:'Youth Flag Football on Long Island — Complete Parent Guide',
   d:'Flag vs. tackle differences, LIFFL, HTB, i9 Sports — and why flag football is now an Olympic sport with a bright future for LI kids.',
   url:'long-island-youth-flag-football-guide.html',m:4},
  {t:'guide',s:'tennis',title:'Youth Tennis on Long Island — USTA Programs & Academies Guide',
   d:'USTA junior pathway, 10 & Under Tennis, JMTA at SPORTIME, SCJTL, and how to find the right program from beginner through nationally ranked.',
   url:'youth-tennis-long-island-guide.html',m:5},
  {t:'guide',s:'hockey',title:'Youth Ice Hockey on Long Island — Learn to Skate Through Travel',
   d:'USA Hockey divisions, Long Island rinks, equipment costs, and the LIAHL pathway from learn-to-skate through competitive travel hockey.',
   url:'youth-hockey-long-island-guide.html',m:5},
  {t:'guide',s:'volleyball',title:'Youth Volleyball on Long Island — Club Teams, Seasons & Recruiting',
   d:'School vs. club volleyball, SPORTIME VBC, the club recruiting timeline, and what the 4% college rate means for your long-term planning.',
   url:'youth-volleyball-long-island-guide.html',m:4},
  {t:'guide',s:'gymnastics',title:'Youth Gymnastics on Long Island — Programs, Levels & What to Expect',
   d:'Recreational vs. XCEL vs. Junior Olympic pathways, what to look for in a gym, and how to avoid the red flags.',
   url:'youth-gymnastics-long-island-guide.html',m:5},
  {t:'guide',s:'softball',title:'Youth Softball on Long Island — Little League, Travel Fastpitch & Recruiting',
   d:'Little League divisions, LI travel fastpitch programs, the pitching development reality, and early recruiting controversy at 10U.',
   url:'youth-softball-long-island-guide.html',m:5},
  {t:'guide',s:'cheerleading',title:'Youth Cheerleading on Long Island — Sideline vs All-Star Guide',
   d:'Sideline vs competitive all-star cheer, tumbling level requirements, true cost breakdown, and programs across Nassau and Suffolk.',
   url:'youth-cheerleading-long-island-guide.html',m:4},
  {t:'guide',s:'golf',title:'Youth Golf on Long Island — Junior Programs & Getting Started',
   d:'TGA Golf, First Tee, Bethpage, county programs, and why Long Island is one of the best places in America to grow up golfing.',
   url:'youth-golf-long-island-guide.html',m:4},
  {t:'guide',s:'field-hockey',title:"Youth Field Hockey on Long Island — LIFHA, Clubs & Getting Started",
   d:"LIFHA's 56 travel teams, the CYO clinic entry point, club pathway to college, equipment checklist, and the scholarship legacy.",
   url:'youth-field-hockey-long-island-guide.html',m:5},
  {t:'guide',s:'wrestling',title:'Youth Wrestling on Long Island — Getting Started, Weight Classes & Programs',
   d:'USA Wrestling weight classes, why wrestling builds mental toughness like no other sport, and the best programs in Nassau and Suffolk.',
   url:'youth-wrestling-long-island-guide.html',m:4},
  {t:'guide',s:'swimming',title:'Youth Competitive Swimming on Long Island — USA Swimming & LIAC Guide',
   d:"USA Swimming pathway, LIAC's Olympic legacy, swim meet formats, the four strokes explained, and real cost breakdown.",
   url:'youth-swimming-long-island-guide.html',m:5},
  {t:'guide',s:'track',title:'Youth Track & Field on Long Island — USATF Junior Olympics & Programs',
   d:'Events explained, USATF Junior Olympic program, CYO track, why track is the best cross-training sport, and programs by county.',
   url:'youth-track-field-long-island-guide.html',m:4},
  // ---- ARTICLES ----
  {t:'article',s:'tennis',title:"From Port Washington to Wimbledon — Long Island's Untold Tennis Story",
   d:'How a small club on the Nassau North Shore produced John McEnroe, Vitas Gerulaitis, Tracy Austin, and changed American tennis forever.',
   url:'long-island-tennis-mcenroe-legacy.html',m:5},
  {t:'article',s:'basketball',title:'Travel Basketball vs. Rec League — Which Is Right for Your Long Island Kid?',
   d:'The pressure to join AAU is real. Here is how to actually decide without the sales pitch from coaches who want your registration fee.',
   url:'long-island-basketball-travel-vs-rec.html',m:4},
  {t:'article',s:'soccer',title:'The Island FC & MLS NEXT — What It Means for Long Island Youth Soccer',
   d:'Long Island now has a unified MLS NEXT pathway from youth through professional. What it means for clubs, players, and families.',
   url:'how-to-choose-travel-soccer-long-island.html',m:5},
  {t:'article',s:'baseball',title:"Long Island's Baseball Recruiting Machine — How LI Produces So Many College Players",
   d:'Long Island consistently sends more players to Division I baseball than almost any other region. Here is how the ecosystem works.',
   url:'long-island-baseball-recruiting-timeline.html',m:7},
];

let activeType='all', activeSport='all';

function render(){
  const el=document.getElementById('grid-container');
  let f=CONTENT.filter(c=>{
    const tm=activeType==='all'||c.t===activeType;
    const sm=activeSport==='all'||c.s===activeSport;
    return tm&&sm;
  });
  if(!f.length){el.innerHTML='<div class="grid"><div class="empty"><h3>No Results</h3><p>Try a different combination.</p></div></div>';return;}
  const guides=f.filter(c=>c.t==='guide');
  const articles=f.filter(c=>c.t==='article');
  let html='';
  if(guides.length&&activeType!=='article'){
    html+=`<div class="section-label">📋 Reference Guides <span>${guides.length} guides</span></div><div class="grid">${guides.map(card).join('')}</div>`;
  }
  if(articles.length&&activeType!=='guide'){
    html+=`<div class="section-label">📰 Articles <span>${articles.length} articles</span></div><div class="grid">${articles.map(card).join('')}</div>`;
  }
  el.innerHTML=html;
}

function card(c){
  const color=C[c.s]||'#0a1628';
  const label=c.t==='guide'?'📋 Guide':'📰 Article';
  const cta=c.t==='guide'?'Read Guide':'Read Article';
  return `<a href="${c.url}" class="card">
    <div class="card-sport-bar" style="background:${color}"></div>
    <div class="card-body">
      <div class="card-type-row"><span class="type-badge badge-${c.t}">${label}</span><span class="sport-tag">${c.s.replace('-',' ')}</span></div>
      <h3>${c.title}</h3>
      <p>${c.d}</p>
      <div class="card-footer"><span class="read-link">${cta} →</span><span class="read-time">⏱ ${c.m} min</span></div>
    </div>
  </a>`;
}

function setType(type,el){
  activeType=type;
  document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');render();
}
function setSport(sport,el){
  activeSport=sport;
  document.querySelectorAll('.sport-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');render();
}
render();
</script>
